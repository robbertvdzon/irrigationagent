<div th:fragment="advice-section" id="advice-section" xmlns:th="http://www.thymeleaf.org">
    <div th:if="${advice == null}">
        <p>No advice available for today.</p>
        <button class="btn" hx-post="/calculate-advice" hx-target="#advice-section">Calculate Advice</button>
    </div>
    <div th:if="${advice != null}">
        <p><strong>Date:</strong> <span th:text="${advice.date}"></span></p>
        <p><strong>Advice:</strong> irrigate for <span th:text="${advice.durationMinutes}"></span> minutes</p>
        <p><strong>Status:</strong> <span th:text="${advice.status}"></span></p>

        <div class="input-group">
            <label for="minutes">Adjust advice (minutes):</label>
            <input type="number" id="minutes" name="minutes" th:value="${advice.durationMinutes}">
            <button class="btn" hx-put="/update-advice" hx-include="#minutes" hx-target="#advice-section">Update</button>
        </div>

        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button th:if="${advice.status != 'EXECUTED'}" class="btn btn-success" hx-post="/execute-now" hx-target="#advice-section">Execute advice now</button>
            <button class="btn" hx-post="/calculate-advice" hx-target="#advice-section">Recalculate Advice</button>
            <span th:if="${advice.status == 'EXECUTED'}">✅ Already executed</span>
        </div>
    </div>
</div>
