spring:
  application:
    name: irrigation-agent
  thymeleaf:
    cache: false
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:irrigation}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:irrigation}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:migration
  threads:
    virtual:
      enabled: true
  sql:
    init:
      mode: always

weather:
  api:
    url: ${WEATHER_API_URL:http://localhost:8081}

irrigation:
  schedule: "0 0 6 * * *"

logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
