spring:
  application:
    name: irrigation-agent
  thymeleaf:
    cache: false
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:irrigation}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:irrigation}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:irrigation}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  threads:
    virtual:
      enabled: true
  logging:
    level:
      org.springframework.web: INFO
      org.hibernate.SQL: INFO
      org.flywaydb: INFO

weather:
  api:
    url: ${WEATHER_API_URL:http://localhost:8081}

irrigation:
  schedule:
    advice: "0 0 6 * * *"
    execution: "0 30 7 * * *"
