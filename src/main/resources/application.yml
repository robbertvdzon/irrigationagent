spring:
  application:
    name: irrigation-agent
  thymeleaf:
    cache: false
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:irrigation}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:irrigation}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:irrigation}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  threads:
    virtual:
      enabled: true
  logging:
    level:
      org.springframework.web: INFO
      org.hibernate.SQL: INFO
      org.flywaydb: INFO

weather:
  api:
    url: ${WEATHER_API_URL:http://localhost:8081}

resilience4j:
  retry:
    instances:
      weatherForecast:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
  circuitbreaker:
    instances:
      weatherForecast:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  ratelimiter:
    instances:
      weatherForecast:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0
  timelimiter:
    instances:
      weatherForecast:
        timeoutDuration: 2s
  bulkhead:
    instances:
      weatherForecast:
        maxConcurrentCalls: 10
        maxWaitDuration: 0

irrigation:
  schedule:
    advice: "0 0 6 * * *"
    execution: "0 30 7 * * *"
